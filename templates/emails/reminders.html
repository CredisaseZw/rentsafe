<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{subject}}</title>
<style>
    body {
    margin: 0;
    padding: 0;
    background-color: #f4f7f8;
    font-family: Arial, Helvetica, sans-serif;
    }

    .email-wrapper {
    width: 100%;
    padding: 40px 0;
    }

    .email-container {
    max-width: 600px;
    margin: 0 auto;
    background-color: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    }

    /* ====== Brand Styles ====== */
    .header {
    background-color: #2c949f; /* Secondary - Jelly Bean */
    color: #ffffff;
    padding: 20px 30px;
    text-align: center;
    }

    .header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    }

    .content {
    padding: 30px;
    color: #333333;
    font-size: 15px;
    line-height: 1.6;
    }

    .highlight-box {
    background-color: #e2f3f4; /* Primary - Black Squeeze */
    padding: 20px;
    border-radius: 6px;
    margin: 20px 0;
    font-size: 16px;
    }

    .property {
    font-weight: bold;
    color: #2c949f;
    }

    .date {
    font-weight: bold;
    }

    .button-wrapper {
    text-align: center;
    margin: 30px 0;
    }

    .btn {
    display: inline-block;
    padding: 12px 24px;
    background-color: #2c949f;
    color: #ffffff !important;
    text-decoration: none;
    border-radius: 4px;
    font-weight: bold;
    font-size: 14px;
    }

    .footer {
    text-align: center;
    font-size: 12px;
    color: #777777;
    padding: 20px 30px;
    background-color: #f9f9f9;
    }

    /* ====== Responsive ====== */
    @media only screen and (max-width: 600px) {
    .content {
        padding: 20px;
    }
    .header h1 {
        font-size: 18px;
    }
    }
</style>
</head>

<body>
  <div class="email-wrapper">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
      <tr>
        <td align="center">
          <table class="email-container" role="presentation" width="100%" cellspacing="0" cellpadding="0">

            <!-- Header -->
            <tr>
              <td class="header">
                <h1>{{subject}}</h1>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td class="content">
                <p>Hello, {{recipient_name}},</p>

                <div class="highlight-box">
                   {{message}}
                </div>
            
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td class="footer">
                &copy; {% now "Y" %} Fincheck. All rights reserved.
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
