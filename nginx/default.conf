# nginx/nginx.conf

upstream app {
    # The 'app' name matches the service name in docker-compose.yml
    server app:8000;
}

server {
    listen 80;

    # Proxy all non-static/media requests to the Django app
    location / {
        proxy_pass http://app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Serve static files directly from the volume
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Serve media files directly from the volume
    location /media/ {
        alias /app/media/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}